<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사회인 준비도 테스트</title>
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--accent:#2563eb;--accent2:#111827;--line:#e5e7eb;}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;background:var(--bg);color:var(--text);}
    .wrap{max-width:720px;margin:0 auto;padding:22px 14px 40px}.hero{background:linear-gradient(135deg,#1d4ed8,#0f172a);color:white;border-radius:24px;padding:28px 22px;box-shadow:0 12px 30px rgba(15,23,42,.18)}
    .series{font-size:14px;opacity:.9;margin-bottom:8px}.hero h1{font-size:34px;line-height:1.15;margin:0 0 8px}.hero h2{font-size:19px;font-weight:650;margin:0 0 14px}.hero p{font-size:14px;line-height:1.6;margin:0;opacity:.92}
    .scoreCard{position:sticky;top:10px;z-index:5;margin:16px 0;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 10px 24px rgba(15,23,42,.09)}
    .scoreRow{display:flex;align-items:center;justify-content:space-between;gap:12px}.score{font-size:42px;font-weight:800;color:var(--accent2);letter-spacing:-1px}.score span{font-size:20px;color:var(--muted);font-weight:600}.badge{padding:8px 12px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-weight:700;font-size:13px;text-align:center}.bar{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:12px}.fill{height:100%;width:0%;background:linear-gradient(90deg,#60a5fa,#2563eb);transition:.25s}
    .result{font-size:15px;line-height:1.55;color:var(--muted);margin-top:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;margin:10px 0;box-shadow:0 6px 18px rgba(15,23,42,.05)}
    label{display:flex;gap:12px;align-items:flex-start;cursor:pointer}.qno{min-width:34px;height:34px;border-radius:12px;background:#eff6ff;color:#1d4ed8;font-weight:800;display:flex;align-items:center;justify-content:center}.qtext{flex:1}.qtext b{display:block;font-size:16px;line-height:1.45}.qtext small{display:block;margin-top:4px;color:var(--muted);font-weight:700}.check{margin-top:4px;width:24px;height:24px;accent-color:#2563eb;flex:none}.actions{display:flex;gap:10px;margin-top:16px}button{border:0;border-radius:14px;padding:13px 14px;font-weight:800;font-size:15px;cursor:pointer;flex:1}.primary{background:#2563eb;color:white}.secondary{background:#e5e7eb;color:#111827}.notice{font-size:13px;line-height:1.6;color:#6b7280;margin-top:18px;padding:14px;border-radius:16px;background:#fff;border:1px dashed #d1d5db}.footer{text-align:center;color:#9ca3af;font-size:12px;margin-top:18px}@media(max-width:420px){.hero h1{font-size:30px}.score{font-size:38px}.card{padding:14px}.qtext b{font-size:15px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="series">준비도 테스트 시리즈 ①</div>
      <h1>사회인 준비도 테스트</h1>
      <h2>당신은 사회에 나갈 준비가 되었습니까?</h2>
      <p>현대 사회에서 독립적인 생활을 시작하기 위해 필요한 기본 준비를 스스로 점검해 보세요.</p>
    </section>

    <section class="scoreCard">
      <div class="scoreRow"><div class="score" id="score">0<span>/100</span></div><div class="badge" id="level">자가진단 시작</div></div>
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="result" id="result">아래 항목을 체크하면 점수와 결과가 자동으로 표시됩니다.</div>
      <div class="actions"><button class="secondary" onclick="resetTest()">다시하기</button><button class="primary" onclick="shareResult()">결과 공유</button></div>
    </section>

    <div id="questions"></div>

    <div class="notice">※ 이 테스트는 개인의 준비 상태를 스스로 점검하기 위한 자가진단입니다. 정답은 없으며, 각자의 환경과 가치관에 따라 필요한 준비는 달라질 수 있습니다.</div>
    <div class="footer">Ready Test Series</div>
  </main>

  <script>
    const questions = [
      [5, '운전면허를 취득했다.'],
      [15, '전공 또는 평생 먹고살 전문기술을 갖추고 있다.'],
      [10, '전문 자격증을 1개 이상 보유하고 있다.'],
      [10, '기초 금융지식(회계·세금·예산관리)을 이해하고 있다.'],
      [10, '독립·결혼·창업 등을 위한 종잣돈(또는 결혼 준비금)을 마련했다.'],
      [5, '6개월 이상 생활 가능한 비상자금을 보유하고 있다.'],
      [5, '신용점수와 대출, 연체의 중요성을 이해하고 관리하고 있다.'],
      [5, '월 예산을 세우고 계획적으로 소비하는 습관이 있다.'],
      [5, '국민연금·건강보험·고용보험 등 사회보험의 기본 개념을 알고 있다.'],
      [5, '근로계약서와 임대차계약서의 중요한 내용을 확인할 수 있다.'],
      [5, '기본적인 컴퓨터 활용 능력(문서 작성, 이메일, 엑셀 등)을 갖추고 있다.'],
      [5, '규칙적인 생활습관과 건강관리를 실천하고 있다.'],
      [5, '약속과 시간을 잘 지키며 타인과 협력할 수 있다.'],
      [5, '문제가 생겼을 때 스스로 해결하려는 책임감이 있다.'],
      [10, '5년 후 자신의 목표와 계획을 가지고 있다.']
    ];
    const box = document.getElementById('questions');
    questions.forEach((q,i)=>{ const card=document.createElement('section'); card.className='card'; card.innerHTML=`<label><div class="qno">${i+1}</div><div class="qtext"><b>${q[1]}</b><small>${q[0]}점</small></div><input class="check" type="checkbox" data-score="${q[0]}" onchange="calc()"></label>`; box.appendChild(card); });
    function message(s){ if(s>=90) return ['충분한 준비','사회에 나갈 준비가 충분합니다.']; if(s>=70) return ['기본 준비 완료','기본적인 준비는 갖추었지만, 몇 가지를 보완하면 더욱 안정적인 출발이 가능합니다.']; if(s>=50) return ['보완 필요','사회생활은 가능하지만 준비를 더 갖추는 것이 좋습니다.']; if(s>=30) return ['준비 단계','아직 준비가 부족합니다. 지금부터 하나씩 준비해 보세요.']; return ['시작 단계','출발은 늦지 않았습니다. 지금 시작하는 것이 가장 빠른 시작입니다.']; }
    function calc(){ let s=0; document.querySelectorAll('.check:checked').forEach(c=>s+=Number(c.dataset.score)); document.getElementById('score').innerHTML=s+'<span>/100</span>'; document.getElementById('fill').style.width=s+'%'; const [lv,msg]=message(s); document.getElementById('level').textContent=lv; document.getElementById('result').textContent=msg; }
    function resetTest(){document.querySelectorAll('.check').forEach(c=>c.checked=false); calc();}
    function shareResult(){ let s=0; document.querySelectorAll('.check:checked').forEach(c=>s+=Number(c.dataset.score)); const text=`성인 준비도 테스트 결과: ${s}/100점\n당신은 사회에 나갈 준비가 되었습니까?`; if(navigator.share){navigator.share({title:'성인 준비도 테스트',text, url:location.href}).catch(()=>{});} else {navigator.clipboard.writeText(text+'\n'+location.href); alert('결과가 복사되었습니다.');}}
    calc();
  </script>
</body>
</html>
